<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L'Oréal Beauty AI Assistant</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<img 
src="loreal-logo.png"
alt="L'Oréal Logo"
class="logo"
>


<h1>
L'Oréal Beauty Assistant
</h1>


<p>
Your personalized AI beauty companion
</p>


</header>




<main>


<section id="question-display">

Ask me about skincare, makeup, haircare, or fragrances.

</section>




<section id="chat-box">


<div class="message bot-message">

Hello! I am your L'Oréal Beauty Assistant.
Ask me about products, routines, or recommendations.

</div>


</section>





<div class="input-area">


<input

id="user-input"

type="text"

placeholder="Ask a beauty question..."

>



<button id="send-button">

Send

</button>



</div>


</main>





<footer>

<p>

Powered by AI • L'Oréal Beauty Experience

</p>

</footer>




<script src="script.js"></script>


</body>

</html>
