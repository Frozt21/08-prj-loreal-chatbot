<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>L'Oréal Beauty Assistant</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <img src="loreal-logo.png" alt="L'Oréal Logo" />

      <h1>L'Oréal Beauty Assistant</h1>

      <p>Your AI-powered beauty companion</p>
    </header>

    <main>
      <!-- Shows the user's newest question -->
      <div id="question-display">
        Ask me about skincare, makeup, haircare, or fragrances.
      </div>

      <!-- Chat messages appear here -->
      <div id="chat-box"></div>

      <div class="input-area">
        <input
          id="user-input"
          type="text"
          placeholder="Ask a beauty question..."
        />

        <button id="send-button">Send</button>
      </div>
    </main>

    <footer>
      <p>Powered by AI • L'Oréal Beauty Experience</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
